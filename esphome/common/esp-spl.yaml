number:
  - platform: template
    name: "Calibration Offset"
    id: calibration_offset
    optimistic: true
    min_value: -20
    max_value: 20
    initial_value: 0.0
    step: 0.1
    restore_value: true
    unit_of_measurement: "dBA"
    mode: box
    entity_category: config
