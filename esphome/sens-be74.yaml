substitutions:
  device_name: "sens-be74"

packages:
  - !include common/api.yaml
  - !include common/logger.yaml
  - !include common/ota.yaml
  - !include common/wifi.yaml
  - !include common/improv-esp32.yaml
  - !include common/web-server.yaml

esphome:
  name: ${device_name}
  friendly_name: ${device_name}
  on_boot:
    priority: 800
    then:
      - switch.turn_off: sensor_led_control

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# I2C Bus setup for GPIO 19 and 20
i2c:
  sda: GPIO19
  scl: GPIO20
  scan: true
  id: bus_a

# Force the sensor LED off using GPIO 15
switch:
  - platform: gpio
    pin: GPIO15
    id: sensor_led_control
    name: "TCS34725 LED"
    inverted: no
    restore_mode: ALWAYS_OFF
    internal: true # Hides the toggle from HA UI so it's "permanently" off

sensor:
  - platform: tcs34725
    address: 0x29
    update_interval: 2s

    color_temperature:
      name: "Color Temperature"
      id: "color_temperature"
      unit_of_measurement: "K"
      accuracy_decimals: 0
      filters:
        # 1. Quantile: Ignore the bottom 70% of noise/shadows (Bias towards clean peaks)
        # Window of 5 at 1s update = 5-second "memory"
        - quantile:
            window_size: 5
            quantile: 0.7
            send_every: 1
        
        # 2. EMA: Smooth out the transitions for the light bulbs
        - exponential_moving_average:
            alpha: 0.15
            send_every: 1

        # 3. Reporting: Don't spam HA unless it changes by 15K or 60s pass
        - or:
          - lambda: |-
              static float last_sent_k = 0;
              if (std::abs(x - last_sent_k) > (last_sent_k * 0.02)) { // 0.02 = 2% change
                last_sent_k = x;
                return x;
              }
              return {};
          - heartbeat: 60s

    # --- ILLUMINANCE CONTROL ---
    illuminance:
      name: "Illuminance"
      id: "illuminance"
      unit_of_measurement: "lx"
      accuracy_decimals: 1
      filters:
        # Same logic for brightness to keep the loop in sync
        - quantile:
            window_size: 5
            quantile: 0.7
            send_every: 1
        - exponential_moving_average:
            alpha: 0.15
            send_every: 1
        - or:
          - lambda: |-
              static float last_sent_val = 0;           
              if (std::abs(x - last_sent_val) > (last_sent_val * 0.05)) { // 0.05 = 5% change
                last_sent_val = x;
                return x;
              }
              return {}; // Block value if it hasn't changed enough
          - heartbeat: 60s

    # Configuration for best indoor results
    integration_time: auto
    # gain: 1x
    # integration_time: 154ms
